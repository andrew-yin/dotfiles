# Enable mouse
set -g mouse on

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Intuitive splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# True color support
set -g default-terminal "tmux-256color"
set -g terminal-features[100] "xterm-ghostty:RGB,clipboard,focus,hyperlinks,extkeys,osc7,sync,usstyle,strikethrough,overline"
set -g focus-events on
set -g extended-keys on
set -g set-clipboard external
set -g allow-passthrough on

# Reduce escape delay (important for vim)
set -sg escape-time 10

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Increase scrollback
set -g history-limit 50000
